services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: pt_db
      POSTGRES_USER: pt
      POSTGRES_PASSWORD: pt_password
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./server/migrations:/docker-entrypoint-initdb.d

volumes:
  pg_data:
